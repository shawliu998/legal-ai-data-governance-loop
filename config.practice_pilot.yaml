project:
  name: Legal AI Practice Benchmark Pilot
  experiment_id: EXP-PRACTICE-BENCHMARK-PILOT
  boundary: licensed adapted practice-case pilot; not legal advice; not model ranking
  jurisdiction: 中国大陆
  law_snapshot_date: "2026-07-07"
  legal_advice_boundary: 仅用于法律 AI 诊断评测和数据治理工作流，不构成法律咨询或最终法律意见。

models:
  - alias: Model_A
    provider: openai_compatible
    base_url: ${MODEL_A_BASE_URL}
    api_key: ${MODEL_A_API_KEY}
    model: ${MODEL_A_NAME}
  - alias: Model_B
    provider: openai_compatible
    base_url: ${MODEL_B_BASE_URL}
    api_key: ${MODEL_B_API_KEY}
    model: ${MODEL_B_NAME}
  - alias: Model_C
    provider: openai_compatible
    base_url: ${MODEL_C_BASE_URL}
    api_key: ${MODEL_C_API_KEY}
    model: ${MODEL_C_NAME}

judge:
  provider: openai_compatible
  base_url: ${JUDGE_BASE_URL}
  api_key: ${JUDGE_API_KEY}
  model: ${JUDGE_MODEL}
  temperature: 0.0

run_plan:
  full_samples: all
  full_versions: [V0, V1, V3]
  deep_samples: []
  deep_versions: [V0, V1, V2, V3]
  deep_run_skip_existing_versions: [V0, V1, V3]

generation:
  temperature: 0.2
  max_output_tokens: 2200
  retry_attempts: 3
  timeout_seconds: 90

scoring:
  dimensions:
    - missing_facts_awareness
    - clarification_quality
    - legal_grounding
    - fact_rule_application
    - conditional_reasoning
    - risk_coverage
    - overclaim_control
    - hallucination_control
    - data_tag_usability

routing:
  high_risk_threshold: high
  low_judge_confidence: low
