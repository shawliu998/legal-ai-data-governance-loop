methodology_caveats:
- API run count is reported separately from non-empty answer count.
- Empty answers are reliability failures and are excluded from legal-content quality
  interpretation.
- Judge metrics are automated baseline signals, not final model rankings or legal
  conclusions.
- The 80-row review set is priority-enriched and contains no public reviewer-level
  A/B labels.
- All 80 rows have populated final review fields, but those fields do not recreate
  independent reviewer A/B labels.
- Formal reviewer IAA and formal judge-human agreement are therefore not reported.
- Claim-level labels are deterministic review flags, not confirmed model error rates.
- Strict citation-defect metrics exclude partially supported claims; release-gate
  needs-review metrics include them.
