methodology_caveats:
- Focused citation/document slice, not a full legal knowledge-base benchmark.
- Claim entailment labels are deterministic triage signals, not final legal conclusions.
- Strict citation-defect flags exclude partially supported claims and use reviewable
  legal claims only.
- Needs-review counts include partially supported claims and are used by the release
  gate.
- Source-boundary blocker counts scan all claim rows; blocker rates use all claim
  rows as denominator.
- Qwen judge scores are baseline signals and should not be treated as final model
  rankings.
- Raw full model outputs remain local/ignored; this package commits summaries and
  redacted samples only.
metric_definitions:
  reviewable_claim_strict_citation_defect_rows: reviewable claims labeled unsupported,
    contradicted, no_citation, out_of_scope_source, or fabricated_citation
  reviewable_claim_needs_review_rows: strict citation defects plus partially_supported
    reviewable claims
  all_claim_source_boundary_blocker_rows: all claim rows labeled out_of_scope_source,
    fabricated_citation, or contradicted
