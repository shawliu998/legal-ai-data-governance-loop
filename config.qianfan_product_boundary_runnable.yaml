project:
  name: Legal AI Product Boundary Runnable Eval - Qianfan
  experiment_id: EXP-QIANFAN-LEGAL-PRODUCT-BOUNDARY-RUNNABLE-V1
  boundary: runnable stratified legal product-boundary evaluation using current V0/V1/V3 workflow mappings; not legal advice; not model ranking
  jurisdiction: 中国大陆
  law_snapshot_date: "2026-07-08"
  legal_advice_boundary: 仅用于法律 AI 产品边界评测和数据治理工作流，不构成法律咨询或最终法律意见。

models:
  - alias: qianfan_ernie_51
    role: target_vendor_candidate
    vendor: Baidu
    family: ERNIE 5.1
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_ERNIE_51}
    input_cost_per_1k: ${QIANFAN_ERNIE_51_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_ERNIE_51_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_deepseek_v4_pro
    role: target_vendor_candidate
    vendor: DeepSeek
    family: DeepSeek V4 Pro
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_DEEPSEEK_V4_PRO}
    input_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_qwen35_27b
    role: target_vendor_candidate
    vendor: Alibaba
    family: Qwen3.5-27B
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_QWEN35_27B}
    input_cost_per_1k: ${QIANFAN_QWEN35_27B_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_QWEN35_27B_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_glm_52
    role: target_vendor_candidate
    vendor: Zhipu
    family: GLM-5.2
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_GLM_52}
    input_cost_per_1k: ${QIANFAN_GLM_52_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_GLM_52_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_lite_baseline
    role: cost_baseline
    vendor: Qianfan
    family: Lite baseline placeholder
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_LITE_BASELINE}
    input_cost_per_1k: ${QIANFAN_LITE_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_LITE_OUTPUT_COST_PER_1K}
    cost_currency: CNY

judge:
  provider: openai_compatible
  base_url: ${QIANFAN_BASE_URL}
  api_key: ${QIANFAN_API_KEY}
  model: ${QIANFAN_JUDGE_MODEL}
  temperature: 0.0

judge_ensemble:
  enabled: true
  purpose: cross-judge calibration for deployment decisions; not a public model leaderboard
  self_eval_exclusion: true
  primary_judges:
    - alias: judge_deepseek_v4_pro
      role: primary
      vendor: DeepSeek
      family: DeepSeek V4 Pro
      provider: openai_compatible
      base_url: ${QIANFAN_BASE_URL}
      api_key: ${QIANFAN_API_KEY}
      model: ${QIANFAN_MODEL_DEEPSEEK_V4_PRO}
      temperature: 0.0
    - alias: judge_glm_52
      role: primary
      vendor: Zhipu
      family: GLM-5.2
      provider: openai_compatible
      base_url: ${QIANFAN_BASE_URL}
      api_key: ${QIANFAN_API_KEY}
      model: ${QIANFAN_MODEL_GLM_52}
      temperature: 0.0
  arbiter:
    alias: judge_ernie_51
    role: arbiter
    vendor: Baidu
    family: ERNIE 5.1
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_ERNIE_51}
    temperature: 0.0
  disagreement:
    score_gap_threshold: 0.15
    critical_failure_mismatch: true
    route_mismatch: true
    single_primary_after_self_eval_exclusion: true

run_plan:
  full_samples: all
  full_versions: [V0, V1, V4, V3, V5]
  deep_samples: []
  deep_versions: [V0, V1, V2, V3, V4, V5]
  deep_run_skip_existing_versions: [V0, V1, V3, V4, V5]

generation:
  temperature: 0.2
  max_output_tokens: 2200
  retry_attempts: 3
  timeout_seconds: 90

rag:
  enabled: true
  corpus_path: data/rag_corpus/legal_sources.csv
  retrieval_versions: [V4, V3]
  top_k: 4
  min_score: 0.0
  retrieval_method: local_bm25_char_bigram_plus_metadata_rerank
  outputs:
    retrieval_log: retrieval_log.csv
    contexts: rag_contexts.csv
    citation_verification: citation_verification.csv

scoring:
  dimensions:
    - missing_facts_awareness
    - clarification_quality
    - legal_grounding
    - fact_rule_application
    - conditional_reasoning
    - risk_coverage
    - overclaim_control
    - hallucination_control
    - data_tag_usability

routing:
  high_risk_threshold: high
  low_judge_confidence: low

workflow_mapping_note:
  V0: w0_closed_book
  V1: w1_structured_legal_prompt
  V4: w2_rag_grounded_provided_context
  V3: w3_risk_control_workflow
  V5: w4_clarification_first
