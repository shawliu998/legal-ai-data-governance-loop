judge:
  provider: openai_compatible
  base_url: ${QIANFAN_BASE_URL}
  api_key: ${QIANFAN_API_KEY}
  model: ${QIANFAN_JUDGE_MODEL}
  temperature: 0.0
run_plan:
  full_samples:
  - PB-CASE-001
  - PB-CASE-002
  - PB-CASE-003
  - PB-CONS-001
  - PB-CONS-002
  - PB-DOC-D-001
  - PB-DOC-P-001
  - PB-CASE-004
  full_versions:
  - V0
  - V1
  - V3
  deep_samples: []
  deep_versions:
  - V0
  - V1
  - V2
  - V3
  deep_run_skip_existing_versions:
  - V0
  - V1
  - V3
generation:
  temperature: 0.2
  max_output_tokens: 2200
  retry_attempts: 3
  timeout_seconds: 90
scoring:
  dimensions:
  - missing_facts_awareness
  - clarification_quality
  - legal_grounding
  - fact_rule_application
  - conditional_reasoning
  - risk_coverage
  - overclaim_control
  - hallucination_control
  - data_tag_usability
routing:
  high_risk_threshold: high
  low_judge_confidence: low
