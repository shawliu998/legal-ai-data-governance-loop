- alias: qianfan_kimi_k26
  role: target_vendor_candidate
  vendor: Moonshot
  family: Kimi K2.6
  provider: openai_compatible
  base_url: ${QIANFAN_BASE_URL}
  api_key: ${QIANFAN_API_KEY}
  model: ${QIANFAN_MODEL_KIMI_K26}
  input_cost_per_1k: ${QIANFAN_KIMI_K26_INPUT_COST_PER_1K}
  output_cost_per_1k: ${QIANFAN_KIMI_K26_OUTPUT_COST_PER_1K}
  cost_currency: CNY
workflow_conditions:
- id: w0_closed_book
  current_prompt_version: V0
  product_shape: direct model answer without retrieval
  mock_compatible: true
- id: w1_structured_legal_prompt
  current_prompt_version: V1
  product_shape: issue -> facts -> law -> analysis -> risk -> next steps
  mock_compatible: true
- id: w2_rag_grounded
  current_prompt_version: V4
  product_shape: answer only using provided statutes, cases, contracts, or policy
    snippets
  mock_compatible: true
  implementation_note: Uses controlled local corpus retrieval, retrieved context injection,
    and citation verification.
- id: w3_rag_verifier_router
  current_prompt_version: V3
  product_shape: grounded answer plus citation verifier, risk checker, and human-review
    routing
  mock_compatible: true
  implementation_note: First version evaluates verifier/router behavior from provided_context
    and judge labels.
- id: w4_clarification_first
  current_prompt_version: V5
  product_shape: ask clarifying questions before final answer when material facts
    are missing
  mock_compatible: true
judge:
  provider: openai_compatible
  base_url: ${QIANFAN_BASE_URL}
  api_key: ${QIANFAN_API_KEY}
  model: ${QIANFAN_JUDGE_MODEL}
  temperature: 0.0
  llm_judge_supported: true
  mock_compatible: true
  human_review_sample_rate: 0.2
judge_ensemble:
  enabled: true
  self_eval_exclusion: true
  design:
    primary: DeepSeek V4 Pro and GLM-5.2 cross-review target model outputs
    arbitration: Kimi K2.6 adjudicates disagreement when score, critical-failure,
      or route labels diverge
    calibration: 20 percent random human review plus 100 percent critical/disagreement
      review
  primary_judges:
  - alias: judge_deepseek_v4_pro
    role: primary
    vendor: DeepSeek
    family: DeepSeek V4 Pro
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_DEEPSEEK_V4_PRO}
    temperature: 0.0
  - alias: judge_glm_52
    role: primary
    vendor: Zhipu
    family: GLM-5.2
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_GLM_52}
    temperature: 0.0
  arbiter:
    alias: judge_kimi_k26
    role: arbiter
    vendor: Moonshot
    family: Kimi K2.6
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_KIMI_K26}
    temperature: 0.0
  disagreement:
    score_gap_threshold: 0.15
    critical_failure_mismatch: true
    route_mismatch: true
    single_primary_after_self_eval_exclusion: true
  purpose: ''
rag:
  enabled: true
  corpus_path: data/rag_corpus/legal_sources.csv
  retrieval_versions:
  - V4
  - V3
  top_k: 4
  min_score: 0.0
  retrieval_method: local_bm25_char_bigram_plus_metadata_rerank
  component_eval:
    retrieval_log: retrieval_log.csv
    contexts: rag_contexts.csv
    citation_verification: citation_verification.csv
    metrics:
    - context_recall
    - context_precision
    - expected_source_hit_count
    - citation_fidelity_label
    - fabricated_citation_count
    - missing_citation_count
    - unsupported_claim_count
    - claim_checks
scoring:
  primary_dimensions:
  - legal_issue_spotting
  - material_fact_sensitivity
  - citation_fidelity
  - risk_calibration
  - clarification_behavior
  - human_review_routing
  - product_usability
  task_specific_rubric_scoring: true
  critical_failure_blocks_release: true
  critical_failure_labels:
  - fabricated_citation
  - invented_fact
  - overconfident_win_rate
  - unsafe_or_deceptive_assistance
  - missed_human_review
  - misclassified_legal_relationship
  - unsupported_document_claim
  - ignored_material_fact_change
  - failed_to_question_bad_premise
outputs:
  capture_cost_latency: true
  capture_data_routing: true
  capture_retrieval_quality: true
  capture_citation_verification: true
  expected_files:
  - model_run_log.csv
  - retrieval_log.csv
  - rag_contexts.csv
  - citation_verification.csv
  - judge_scores.csv
  - data_routing.csv
  - human_review_calibration.csv
  - release_gate.csv
  - executive_dashboard.xlsx
product_decision_outputs:
- auto_answer_eligibility
- human_review_policy
- model_workflow_routing
- release_gate_decision
- badcase_mining
- sft_queue
- preference_queue
- regression_growth
