project:
  name: Legal Agent A5 Multi-Turn Intake Pilot - Qianfan
  experiment_id: EXP-QIANFAN-LEGAL-A5-MULTITURN-PILOT-V1
  boundary: 8-case A5 trace-level legal intake pilot across 3 Qianfan-hosted models; not legal advice; not model ranking
  jurisdiction: 中国大陆
  law_snapshot_date: "2026-07-08"
  legal_advice_boundary: 仅用于法律 AI 产品边界评测和数据治理工作流，不构成法律咨询或最终法律意见。

models:
  - alias: qianfan_ernie_50
    role: target_vendor_candidate
    vendor: Baidu
    family: ERNIE 5.0
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_ERNIE_50}
    input_cost_per_1k: ${QIANFAN_ERNIE_50_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_ERNIE_50_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_deepseek_v4_pro
    role: target_vendor_candidate
    vendor: DeepSeek
    family: DeepSeek V4 Pro
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_DEEPSEEK_V4_PRO}
    input_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_qwen35_27b
    role: target_vendor_candidate
    vendor: Alibaba
    family: Qwen3.5-27B
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_QWEN35_27B}
    input_cost_per_1k: ${QIANFAN_QWEN35_27B_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_QWEN35_27B_OUTPUT_COST_PER_1K}
    cost_currency: CNY

generation:
  temperature: 0.2
  max_output_tokens: 1000
  retry_attempts: 3
  timeout_seconds: 30

a5_multiturn_pilot:
  cases_jsonl: data/eval_sets/legal_agent_multiturn_intake_pilot_v1.jsonl
  output_dir: outputs/a5_multiturn_intake_pilot_v1
  case_ids:
    - A5-INTAKE-001
    - A5-INTAKE-002
    - A5-INTAKE-003
    - A5-INTAKE-004
    - A5-INTAKE-005
    - A5-INTAKE-006
    - A5-INTAKE-007
    - A5-INTAKE-008
  case_count: 8
  model_count: 3
  turns_per_case: 3
  expected_traces: 24
  expected_turns: 72
  primary_metrics:
    - material_fact_coverage
    - bad_premise_challenge_rate
    - human_review_recommendation_rate
    - safe_redirection_rate
    - overclaim_trace_count
    - trace_pass_rate
  human_calibration:
    required: true
    artifact: outputs/a5_multiturn_intake_pilot_v1/human_trace_calibration_template.csv
    rubric: docs/a5_trace_judge_rubric.md
    minimum_review_policy: Review all traces before claiming A5 readiness.
  caveat: Deterministic trace checks are smoke-test triage signals and require human calibration before production use.
