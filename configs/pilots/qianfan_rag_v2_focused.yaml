project:
  name: Legal AI RAG V2 Focused Pilot - Qianfan
  experiment_id: EXP-QIANFAN-LEGAL-RAG-V2-FOCUSED-PILOT
  boundary: 8 citation-grounding cases across 3 Qianfan-hosted models and 3 workflows; focused on source grounding, not model ranking
  jurisdiction: 中国大陆
  law_snapshot_date: "2026-07-08"
  legal_advice_boundary: 仅用于法律 AI 产品边界评测和数据治理工作流，不构成法律咨询或最终法律意见。

models:
  - alias: qianfan_ernie_50
    role: target_vendor_candidate
    vendor: Baidu
    family: ERNIE 5.0
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_ERNIE_50}
    input_cost_per_1k: ${QIANFAN_ERNIE_50_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_ERNIE_50_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_deepseek_v4_pro
    role: target_vendor_candidate
    vendor: DeepSeek
    family: DeepSeek V4 Pro
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_DEEPSEEK_V4_PRO}
    input_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_DEEPSEEK_V4_PRO_OUTPUT_COST_PER_1K}
    cost_currency: CNY
  - alias: qianfan_qwen35_27b
    role: target_vendor_candidate
    vendor: Alibaba
    family: Qwen3.5-27B
    provider: openai_compatible
    base_url: ${QIANFAN_BASE_URL}
    api_key: ${QIANFAN_API_KEY}
    model: ${QIANFAN_MODEL_QWEN35_27B}
    input_cost_per_1k: ${QIANFAN_QWEN35_27B_INPUT_COST_PER_1K}
    output_cost_per_1k: ${QIANFAN_QWEN35_27B_OUTPUT_COST_PER_1K}
    cost_currency: CNY

judge:
  provider: openai_compatible
  base_url: ${QIANFAN_BASE_URL}
  api_key: ${QIANFAN_API_KEY}
  model: ${QIANFAN_MODEL_QWEN35_27B}
  temperature: 0.0

run_plan:
  full_samples:
    - LPB-CITE-001
    - LPB-CITE-002
    - LPB-CITE-003
    - LPB-CITE-004
    - LPB-CITE-005
    - LPB-CITE-006
    - LPB-CITE-007
    - LPB-CITE-008
  full_versions:
    - V1
    - V4
    - V5
  deep_samples: []
  deep_versions:
    - V1
    - V4
    - V5
  deep_run_skip_existing_versions:
    - V1
    - V4
    - V5

generation:
  temperature: 0.2
  max_output_tokens: 1600
  retry_attempts: 3
  timeout_seconds: 90

rag:
  enabled: true
  corpus_path: data/rag_corpus/legal_sources.csv
  retrieval_versions:
    - V4
  top_k: 4
  min_score: 0.0
  retrieval_method: local_bm25_char_bigram_plus_metadata_rerank
  source_boundary_policy: provided_context_sources_are_allowed_for_source_limited_cases
  outputs:
    retrieval_log: retrieval_log.csv
    contexts: rag_contexts.csv
    citation_verification: citation_verification.csv

scoring:
  dimensions:
    - citation_fidelity
    - source_boundary_control
    - legal_grounding
    - material_fact_sensitivity
    - risk_calibration
    - hallucination_control
    - human_review_routing
    - data_tag_usability

routing:
  high_risk_threshold: high
  low_judge_confidence: low

rag_v2_pilot:
  dataset: data/product_boundary_pilot/dataset_manifest.yaml
  cases_jsonl: data/eval_sets/legal_product_boundary_pilot_v1.jsonl
  output_dir: outputs/rag_v2_focused_pilot_v1
  case_count: 8
  model_count: 3
  workflow_versions:
    - V1
    - V4
    - V5
  expected_api_run_records: 72
  primary_metrics:
    - source_boundary_precision
    - allowed_source_recall
    - citation_coverage_rate
    - reviewable_claim_needs_review_rate
    - all_claim_source_boundary_blocker_rate
  caveat: Qwen judge scores are baseline signals; claim entailment remains deterministic triage before legal review.
