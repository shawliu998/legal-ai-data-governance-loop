project:
  name: Legal AI Product Eval System - DeepSeek Smoke Run
  experiment_id: EXP-DEEPSEEK-SMOKE-EVAL
  boundary: small-sample API smoke evaluation for data-governance workflow validation; not legal advice; not model ranking
  jurisdiction: 中国大陆
  law_snapshot_date: "2026-07-07"
  legal_advice_boundary: 仅用于法律 AI 诊断评测和数据治理工作流，不构成法律咨询或最终法律意见。

models:
  - alias: DeepSeek_Smoke
    provider: openai_compatible
    base_url: ${DEEPSEEK_BASE_URL}
    api_key: ${DEEPSEEK_API_KEY}
    model: ${DEEPSEEK_MODEL}

judge:
  provider: openai_compatible
  base_url: ${DEEPSEEK_BASE_URL}
  api_key: ${DEEPSEEK_API_KEY}
  model: ${DEEPSEEK_JUDGE_MODEL}
  temperature: 0.0

run_plan:
  full_samples:
    - L-001
    - L-004
    - L-008
    - L-018
    - L-025
    - L-032
    - L-037
    - L-040
    - X-CONS-001
    - X-CASE-008
    - X-DOC-003
    - X-DOC-010
  full_versions: [V0, V3]
  deep_samples: [L-004, L-008, L-040]
  deep_versions: [V0, V1, V2, V3]
  deep_run_skip_existing_versions: [V0, V3]

generation:
  temperature: 0.2
  max_output_tokens: 1800
  retry_attempts: 3
  timeout_seconds: 60

scoring:
  dimensions:
    - missing_facts_awareness
    - clarification_quality
    - legal_grounding
    - fact_rule_application
    - conditional_reasoning
    - risk_coverage
    - overclaim_control
    - hallucination_control
    - data_tag_usability

routing:
  high_risk_threshold: high
  low_judge_confidence: low
